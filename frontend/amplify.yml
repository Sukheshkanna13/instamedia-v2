version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - echo "Installing dependencies..."
        - npm ci
    build:
      commands:
        - echo "VITE_API_URL=https://areolar-shantay-mercenarily.ngrok-free.dev" > .env.production
        - echo "VITE_ENVIRONMENT=production" >> .env.production
        - echo "Building Vite React SPA for production..."
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
