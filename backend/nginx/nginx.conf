worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone for API protection
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Redirect HTTP traffic to HTTPS
    server {
        listen 80;
        server_name api.instamedia.ai; # Replace with actual domain

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server block
    server {
        listen 443 ssl;
        server_name api.instamedia.ai; # Replace with actual domain

        # SSL Configuration (Paths mapped via docker-compose from EC2 Host)
        ssl_certificate /etc/letsencrypt/live/api.instamedia.ai/fullchain.pem; # Replace domain
        ssl_certificate_key /etc/letsencrypt/live/api.instamedia.ai/privkey.pem; # Replace domain
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Main API Routing
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            
            # Proxy configurations
            proxy_pass http://backend:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Handle CORS optimally at the Nginx layer for the Amplify Frontend
            add_header 'Access-Control-Allow-Origin' '*' always; # Replace '*' with Amplify URL in production
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Handle Preflight OPTIONS requests natively in Nginx
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}
