version: 1
# AWS Amplify Build Configuration for InstaMedia AI v2 (Frontend Only)
# The Python/Flask backend must be deployed separately (EC2, ECS, or Lambda).

frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - echo "Installing dependencies..."
        - npm ci --legacy-peer-deps
    build:
      commands:
        - echo "VITE_API_URL=$VITE_API_URL" > .env.production
        - echo "VITE_ENVIRONMENT=production" >> .env.production
        - echo "Building Vite React SPA for production..."
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*

# ─── Environment variables (set these in Amplify Console) ───
# VITE_API_URL = https://your-backend-api-domain.com
